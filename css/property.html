<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>@property Animasyon Örneği</title>
<style>
/* Renk değişkeni */
@property --box-color {
  syntax: '<color>';
  inherits: false;
  initial-value: #3498db;
}

/* Boyut değişkeni */
@property --box-size {
  syntax: '<length>';
  inherits: false;
  initial-value: 100px;
}

/* Kutunun stili */
.box {
  width: var(--box-size);
  height: var(--box-size);
  background-color: var(--box-color);
  transition: width 0.5s ease, height 0.5s ease, background-color 0.5s ease;
  border-radius: 12px;
  margin: 50px auto;
}

/* Hover ile değişim */
.box:hover {
  --box-color: #e74c3c; /* Renk değişir */
  --box-size: 150px;     /* Boyut değişir */
}
</style>
</head>
<body>

<div class="box"></div>

</body>
</html>
